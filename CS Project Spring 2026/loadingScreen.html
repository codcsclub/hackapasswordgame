<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <style> 
        .continue-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: none; /* Hide initially */
        }
    </style>
</head>
<body style="background-color: black;">
    
    <!-- Loading Animation -->
    <img src="/images/matrix.gif" alt="Loading animation" 
         style="width: 100%; height: 100vh; object-fit: cover;">
    
    <!-- Continue Button -->
    <button id="continueBtn" class="continue-button"
        style="background-color: black; color: #15b812; border: 1px solid #15b812; padding: 10px 20px; font-size: 16px;"
        onclick="window.location.href='performanceSummary.html'">
        Continue
    </button>

    <script>
        // Wait 5 minutes (300,000 milliseconds), then show the button
        setTimeout(() => {
            document.getElementById("continueBtn").style.display = "block";
        }, 300000);
    </script>

</body>
</html>
